<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBFAF6"/>
      <stop offset="100%" stop-color="#EFEDE6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#107266" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#107266" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#107266" fill-opacity="0.06"/>
    </pattern>
    <filter id="termShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="0" dy="16" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#dots)"/>
  <circle cx="800" cy="500" r="640" fill="url(#glow)"/>

  <g transform="translate(160, 120)" filter="url(#termShadow)">
    <rect width="1280" height="760" rx="14" fill="#1B1F23" stroke="#0F1316" stroke-width="1"/>

    <rect width="1280" height="48" rx="14" fill="#0F1316"/>
    <rect y="32" width="1280" height="16" fill="#0F1316"/>

    <circle cx="26" cy="24" r="7" fill="#FF5F57"/>
    <circle cx="50" cy="24" r="7" fill="#FEBC2E"/>
    <circle cx="74" cy="24" r="7" fill="#28C841"/>

    <text x="640" y="30" font-family="-apple-system, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif" font-size="14" fill="#7A8088" text-anchor="middle">simple_chatbot_v2.py — python</text>

    <g font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, monospace" font-size="20">
      <text x="32" y="100" fill="#7A8088">$ python simple_chatbot_v2.py</text>
      <text x="32" y="142" fill="#E5E9F0">Chat Assistant Ready! type 'bye' or 'exit' to stop.</text>

      <text x="32" y="200" fill="#107266" font-weight="700">You:</text>
      <text x="92" y="200" fill="#E5E9F0">Explain Machine Learning in short.</text>

      <text x="32" y="252" fill="#22C55E" font-weight="700">Assistant 🤖:</text>
      <text x="32" y="288" fill="#CDD3DD">Machine learning is a branch of AI where systems learn</text>
      <text x="32" y="316" fill="#CDD3DD">patterns from data instead of being explicitly programmed.</text>
      <text x="32" y="344" fill="#CDD3DD">Models train on examples, then generalize to make predictions</text>
      <text x="32" y="372" fill="#CDD3DD">on new inputs.</text>

      <text x="32" y="408" fill="#3A4048">────────────────────────────────────────────────────────────</text>

      <text x="32" y="460" fill="#107266" font-weight="700">You:</text>
      <text x="92" y="460" fill="#E5E9F0">Give me one real-world example.</text>

      <text x="32" y="512" fill="#22C55E" font-weight="700">Assistant 🤖:</text>
      <text x="32" y="548" fill="#CDD3DD">Email spam filters. They learn from millions of labeled</text>
      <text x="32" y="576" fill="#CDD3DD">messages which patterns indicate spam, then flag new</text>
      <text x="32" y="604" fill="#CDD3DD">emails on the same signals — no hand-written rules required.</text>

      <text x="32" y="640" fill="#3A4048">────────────────────────────────────────────────────────────</text>

      <text x="32" y="692" fill="#107266" font-weight="700">You:</text>
      <text x="92" y="692" fill="#E5E9F0">_</text>
      <rect x="98" y="676" width="14" height="22" fill="#E5E9F0">
        <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g transform="translate(80, 920)" font-family="-apple-system, 'SF Pro Text', system-ui, sans-serif" font-size="18" fill="#5A5A60">
    <text x="0" y="0">LangChain v1 · create_agent · Gemini 2.5 Flash · Multi-turn CLI</text>
  </g>
</svg>
